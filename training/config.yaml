base_model: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
dataset_path: "../data/train.jsonl"
eval_dataset_path: "../data/eval_set.jsonl"
output_dir: "./output/reflection-lora"

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - "q_proj"
    - "v_proj"
  bias: "none"
  task_type: "CAUSAL_LM"

training:
  num_epochs: 3
  per_device_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.1
  max_seq_length: 512
  lr_scheduler_type: "cosine"
  logging_steps: 10
  save_strategy: "epoch"
  fp16: true
  seed: 42

generation:
  max_new_tokens: 150
  temperature: 0.7
  top_p: 0.9
  do_sample: true
